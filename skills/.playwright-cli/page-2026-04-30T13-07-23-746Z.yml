    - generic [ref=e90]:
      - heading "作品简介" [level=2] [ref=e92]
      - paragraph [ref=e94]: 【兄夺弟妻+蓄意撩拨】 （黑切黑恶女✖️禁欲冷情少傅） 前世，裴惊絮为战死的夫君容玄舟守寡三年，却等来他携战友遗孀白疏桐与一双儿女回京。 容家父母缄默，只劝她贤惠大度。 那遗孀姿容绝世，入京不久便引得京城权贵争风吃醋，就连容玄舟也被她吸引，对其温柔呵护。 最终，裴惊絮被白疏桐的追求者当做投名状，溺毙荷花池。 濒死方悟，自己原来活在万人迷话本里，是女主白疏桐宠冠京城路上的绊脚石。 重活一世，身为恶毒女配的裴惊絮意识到，要在女主回京之前，给自己找个靠山。 于是，裴惊絮的心思打到了那位清绝无双，鹤骨松姿的容家大郎，当朝少傅——容谏雪身上。 是夜，裴惊絮眼尾猩红，薄裳透骨，哭得梨花带雨，叩开他房门：“夫兄，二郎不在，阿絮真的好怕……” 容谏雪眸光冷沉，袖间的佛珠颗颗收紧。 -- 容玄舟回京之后，发现他那糟糠之妻竟不缠着他，反倒频频出入兄长宅院。 素来知晓兄长严苛，容玄舟冷声对她道：“你若是服个软，我便让大哥不罚你了。” 屏风后，容谏雪将她半截玉臂抓回。 男人目光晦暗，哑声替她答：“她该罚。” -- 后来裴惊絮跑了。 城外，私兵列队，男人步步逼近，眼中是滔天妄念：“阿絮说得对，我们是该有个孩子了。” 后排提醒：男主与男配非亲兄弟~
